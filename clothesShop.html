<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fashion Store</title>
   <style>*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f8f8f8;
}

header{
    background:#111;
    color:white;
    padding:15px 50px;
}

nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

nav ul{
    display:flex;
    list-style:none;
}

nav ul li{
    margin-left:20px;
}

nav ul li a{
    color:white;
    text-decoration:none;
}

.hero{
    height:90vh;
    background:url("https://images.unsplash.com/photo-1441986300917-64674bd600d8?w=1200")
    center/cover no-repeat;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
}

.hero-content{
    color:white;
    background:rgba(0,0,0,0.5);
    padding:30px;
    border-radius:10px;
}

.hero-content h1{
    font-size:50px;
}

.hero-content p{
    margin:15px 0;
}

button{
    padding:12px 25px;
    border:none;
    background:#ff4d4d;
    color:white;
    cursor:pointer;
    border-radius:5px;
}

.products{
    padding:50px;
    text-align:center;
}

.product-container{
    display:flex;
    justify-content:center;
    gap:20px;
    margin-top:30px;
    flex-wrap:wrap;
}

.card{
    background:white;
    padding:15px;
    width:280px;
    border-radius:10px;
    box-shadow:0 4px 8px rgba(0,0,0,0.1);
}

.card img{
    width:100%;
    border-radius:10px;
}

footer{
    background:#111;
    color:white;
    text-align:center;
    padding:20px;
}
button{
    position:relative;
    overflow:hidden;
}

@keyframes ripple{
    to{
        transform:scale(4);
        opacity:0;
    }
}
.back-btn {
    position: fixed;
    top: 20px;
    left: 20px;
    font-size: 15px;
    color: #020617;
    text-decoration: none;
    background: #38bdf8;
    padding: 10px 16px;
    border-radius: 10px;
    font-weight: 600;
    transition: all 0.3s ease;
    z-index: 100;
  }

  .back-btn:hover {
    background: #131313;
  }
</style>
</head>
<body>
    <a href="projects.html" class="back-btn">
  ⬅ Back
</a>

    <!-- Header -->
    <header>
        <nav>
            <h2 class="logo">FashionHub</h2>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">Collections</a></li>
                <li><a href="#">Shop</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </nav>
    </header>

    <!-- Hero Section -->
    <section class="hero">
        <div class="hero-content">
            <h1>Discover Your Style</h1>
            <p>Premium Fashion Collection for Men & Women</p>
            <button onclick="shopNow()">Shop Now</button>
        </div>
    </section>

    <!-- Products -->
    <section class="products">
        <h2>Trending Collections</h2>

        <div class="product-container">

            <div class="card">
                <img src="https://via.placeholder.com/250" alt="">
                <h3>Men's Jacket</h3>
                <p>₹1999</p>
            </div>

            <div class="card">
                <img src="https://via.placeholder.com/250" alt="">
                <h3>Women's Dress</h3>
                <p>₹1499</p>
            </div>

            <div class="card">
                <img src="https://via.placeholder.com/250" alt="">
                <h3>Casual T-Shirt</h3>
                <p>₹799</p>
            </div>

        </div>
    </section>

    <!-- Footer -->
    <footer>
        <p>© 2026 FashionHub. All Rights Reserved.</p>
    </footer>

    <script>// =======================
// FashionHub JavaScript
// =======================

// Typing Effect
const text = "Premium Fashion Collection for Men & Women";
const typingElement = document.querySelector(".hero-content p");

let index = 0;

function typeWriter() {
    if (index < text.length) {
        typingElement.innerHTML += text.charAt(index);
        index++;
        setTimeout(typeWriter, 50);
    }
}

typingElement.innerHTML = "";
typeWriter();


// Shop Button Scroll
function shopNow() {
    document.getElementById("products").scrollIntoView({
        behavior: "smooth"
    });
}


// Navbar Scroll Effect
window.addEventListener("scroll", () => {
    const header = document.querySelector("header");

    if (window.scrollY > 50) {
        header.style.background = "#000";
        header.style.boxShadow = "0 4px 20px rgba(0,0,0,0.3)";
    } else {
        header.style.background = "#111";
        header.style.boxShadow = "none";
    }
});


// Product Card Hover Animation
const cards = document.querySelectorAll(".card");

cards.forEach(card => {

    card.addEventListener("mouseenter", () => {
        card.style.transform = "translateY(-15px) scale(1.05)";
        card.style.transition = "0.4s";
    });

    card.addEventListener("mouseleave", () => {
        card.style.transform = "translateY(0px) scale(1)";
    });

});


// Scroll Reveal Animation
const revealElements = document.querySelectorAll(".card");

function revealOnScroll() {

    const windowHeight = window.innerHeight;

    revealElements.forEach(element => {

        const top = element.getBoundingClientRect().top;

        if (top < windowHeight - 100) {
            element.style.opacity = "1";
            element.style.transform = "translateY(0)";
        }

    });

}

revealElements.forEach(element => {
    element.style.opacity = "0";
    element.style.transform = "translateY(50px)";
    element.style.transition = "0.8s";
});

window.addEventListener("scroll", revealOnScroll);
revealOnScroll();


// Create Back To Top Button
const topButton = document.createElement("button");

topButton.innerText = "↑";
topButton.id = "topBtn";

document.body.appendChild(topButton);

topButton.style.position = "fixed";
topButton.style.bottom = "30px";
topButton.style.right = "30px";
topButton.style.width = "50px";
topButton.style.height = "50px";
topButton.style.borderRadius = "50%";
topButton.style.border = "none";
topButton.style.fontSize = "22px";
topButton.style.cursor = "pointer";
topButton.style.display = "none";
topButton.style.zIndex = "999";
topButton.style.background = "#ff4d4d";
topButton.style.color = "#fff";


window.addEventListener("scroll", () => {

    if (window.scrollY > 300) {
        topButton.style.display = "block";
    } else {
        topButton.style.display = "none";
    }

});

topButton.addEventListener("click", () => {

    window.scrollTo({
        top: 0,
        behavior: "smooth"
    });

});


// Button Ripple Effect
const buttons = document.querySelectorAll("button");

buttons.forEach(button => {

    button.addEventListener("click", function (e) {

        const circle = document.createElement("span");

        const diameter = Math.max(
            button.clientWidth,
            button.clientHeight
        );

        circle.style.width = circle.style.height =
            `${diameter}px`;

        circle.style.position = "absolute";
        circle.style.borderRadius = "50%";
        circle.style.background = "rgba(255,255,255,0.5)";
        circle.style.transform = "scale(0)";
        circle.style.animation =
            "ripple 0.6s linear";

        const rect = button.getBoundingClientRect();

        circle.style.left =
            `${e.clientX - rect.left - diameter / 2}px`;

        circle.style.top =
            `${e.clientY - rect.top - diameter / 2}px`;

        const ripple = button.getElementsByClassName("ripple")[0];

        if (ripple) {
            ripple.remove();
        }

        circle.classList.add("ripple");

        button.appendChild(circle);

    });

});


// Product Counter Animation
let count = 0;

const counter = document.createElement("h3");

counter.style.textAlign = "center";
counter.style.marginTop = "20px";

document.querySelector(".products").prepend(counter);

function animateCounter() {

    if (count < 5000) {

        count += 50;

        counter.innerHTML =
            "👕 Happy Customers: " + count + "+";

        requestAnimationFrame(animateCounter);

    }

}

animateCounter();


// Random Fashion Quotes
const quotes = [
    "Fashion is the armor to survive reality.",
    "Style is a way to say who you are.",
    "Elegance never goes out of style.",
    "Dress like you're already famous.",
    "Fashion changes, style remains."
];

const quoteElement = document.createElement("p");

quoteElement.style.textAlign = "center";
quoteElement.style.marginTop = "20px";
quoteElement.style.fontWeight = "bold";

document.querySelector(".hero-content")
.appendChild(quoteElement);

setInterval(() => {

    const random =
        Math.floor(Math.random() * quotes.length);

    quoteElement.innerHTML = quotes[random];

}, 3000);</script>
</body>
</html>
