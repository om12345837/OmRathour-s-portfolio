<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Me</title>

    <!-- Font Awesome -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(180deg, #0f172a, #020617);
            color: #e5e7eb;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* Back Button (Mobile Friendly) */
        .back-btn {
            position: fixed;
            top: 14px;
            left: 14px;
            text-decoration: none;
            color: #38bdf8;
            background: rgba(15, 23, 42, 0.95);
            padding: 10px 14px;
            border-radius: 10px;
            border: 1px solid #38bdf8;
            font-size: 14px;
        }

        /* Card */
        .contact-box {
            width: 100%;
            max-width: 420px;
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(10px);
            padding: 26px 20px;
            border-radius: 18px;
            border: 1px solid rgba(56, 189, 248, 0.3);
            box-shadow: 0 8px 25px rgba(0,0,0,0.5);
        }

        h1 {
            text-align: center;
            color: #38bdf8;
            font-size: 26px;
            margin-bottom: 26px;
        }

        /* Contact Row */
        .contact-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px;
            border-radius: 14px;
            margin-bottom: 14px;
            background: rgba(255,255,255,0.04);
        }

        .contact-item i {
            font-size: 22px;
            color: #38bdf8;
            min-width: 26px;
        }

        .contact-item a {
            text-decoration: none;
            color: #e5e7eb;
            font-size: 16px;
            word-break: break-all;
        }

        .contact-item:active {
            background: rgba(56, 189, 248, 0.15);
        }

        /* Tablet & Desktop */
        @media (min-width: 768px) {
            h1 {
                font-size: 32px;
            }

            .contact-item a {
                font-size: 18px;
            }
        }
    </style>

<body>

<a href="index.html" class="back-btn">⬅ Back</a>

<div class="contact-box">
    <h1>Contact Me</h1>

    <div class="contact-item">
        <i class="fa-solid fa-phone"></i>
        <a href="tel:+918750095134">+91 87500 95134</a>
    </div>

    <div class="contact-item">
        <i class="fa-solid fa-envelope"></i>
        <a href="mailto:omrathour118@gmail.com">omrathour118@gmail.com</a>
    </div>
</div>

</body>
</html>
