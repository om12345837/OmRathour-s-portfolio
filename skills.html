<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <!-- 🔥 MUST FOR PHONE -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>My Skills</title>

    <!-- Font Awesome Icons -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap"
        rel="stylesheet">

    <style>
        /* ===== RESET ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        /* ===== PAGE BASE ===== */
        body {
            background: #0f172a;
            color: #e5e7eb;
            padding: 80px 24px;
        }

        /* ===== PAGE TITLE ===== */
        h1 {
            text-align: center;
            margin-bottom: 50px;
            font-size: 36px;
            color: #38bdf8;
        }

        /* ===== SKILLS GRID ===== */
        .skills-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 28px;
            max-width: 1100px;
            margin: auto;
        }

        /* ===== SKILL CARD ===== */
        .skill-box {
            background: #020617;
            border: 1px solid #1e293b;
            border-radius: 16px;
            padding: 28px 16px;
            text-align: center;
            transition: all 0.35s ease;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.35);
        }

        .skill-box:hover {
            transform: translateY(-10px);
            border-color: #38bdf8;
        }

        /* ===== ICON ===== */
        .skill-box i {
            font-size: 42px;
            margin-bottom: 14px;
            color: #38bdf8;
        }

        /* ===== SKILL NAME ===== */
        .skill-box h3 {
            font-size: 16px;
            font-weight: 600;
            color: #f8fafc;
        }

        /* ===== BACK BUTTON ===== */
        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            font-size: 15px;
            color: #020617;
            text-decoration: none;
            background: #38bdf8;
            padding: 10px 16px;
            border-radius: 10px;
            font-weight: 600;
            transition: all 0.3s ease;
            z-index: 100;
        }

        .back-btn:hover {
            background: #0ea5e9;
        }

        /* 🔥 MOBILE RESPONSIVE */
        @media (max-width: 768px) {
            body {
                padding: 60px 16px;
            }

            h1 {
                font-size: 26px;
                margin-bottom: 35px;
            }

            .skill-box {
                padding: 22px 14px;
            }

            .skill-box i {
                font-size: 36px;
            }

            .skill-box h3 {
                font-size: 15px;
            }

            .back-btn {
                font-size: 14px;
                padding: 8px 14px;
                top: 14px;
                left: 14px;
            }
        }
    </style>
</head>

<body>

    <a href="index.html" class="back-btn">⬅ Back</a>

    <h1>My Skills</h1>

    <div class="skills-container">

        <div class="skill-box">
            <i class="fa-brands fa-html5"></i>
            <h3>HTML</h3>
        </div>

        <div class="skill-box">
            <i class="fa-brands fa-css3-alt"></i>
            <h3>CSS</h3>
        </div>

        <div class="skill-box">
            <i class="fa-brands fa-js"></i>
            <h3>JavaScript</h3>
        </div>

        <div class="skill-box">
            <i class="fa-brands fa-react"></i>
            <h3>React.js</h3>
        </div>

        <div class="skill-box">
            <i class="fa-brands fa-node-js"></i>
            <h3>Node.js</h3>
        </div>

        <div class="skill-box">
            <i class="fa-solid fa-server"></i>
            <h3>Express.js</h3>
        </div>

        <div class="skill-box">
            <i class="fa-solid fa-database"></i>
            <h3>MongoDB</h3>
        </div>

        <div class="skill-box">
            <i class="fa-solid fa-database"></i>
            <h3>MySQL</h3>
        </div>

        <div class="skill-box">
            <i class="fa-brands fa-git-alt"></i>
            <h3>Git</h3>
        </div>

        <div class="skill-box">
            <i class="fa-brands fa-github"></i>
            <h3>GitHub</h3>
        </div>

        <div class="skill-box">
            <i class="fa-solid fa-code"></i>
            <h3>REST APIs</h3>
        </div>

        <div class="skill-box">
            <i class="fa-solid fa-laptop-code"></i>
            <h3>Full Stack Development</h3>
        </div>

    </div>

</body>
</html>
