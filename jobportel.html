<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Portel</title>
</head>
<style>
    body {
        margin: 0;
        font-family: 'Segoe UI', sans-serif;
        background: linear-gradient(135deg, #4facfe, #00f2fe);
        color: #333;
    }

    /* Header */
    header {
        text-align: center;
        padding: 20px;
        color: white;
    }

    header h1 {
        font-size: 28px;
    }

    /* Search */
    .search-box {
        text-align: center;
        padding: 10px;
    }

    .search-box input {
        width: 90%;
        max-width: 400px;
        padding: 12px;
        border-radius: 25px;
        border: none;
        font-size: 16px;
    }

    /* Job Container */
    .job-container {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        padding: 10px;
    }

    /* Job Card */
    .job {
        background: white;
        margin: 10px;
        padding: 15px;
        width: 300px;
        max-width: 90%;
        border-radius: 15px;
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        transition: 0.3s;
    }

    .job:hover {
        transform: translateY(-5px);
    }

    /* Button */
    button {
        background: linear-gradient(45deg, #ff6a00, #ee0979);
        color: white;
        border: none;
        padding: 10px;
        border-radius: 20px;
        cursor: pointer;
        width: 100%;
    }

    /* 🔥 MOBILE RESPONSIVE */
    @media (max-width: 768px) {
        header h1 {
            font-size: 22px;
        }

        .job-container {
            flex-direction: column;
            align-items: center;
        }

        .job {
            width: 95%;
        }
    }

    /* 🔥 EXTRA SMALL DEVICES */
    @media (max-width: 480px) {
        header {
            padding: 15px;
        }

        header p {
            font-size: 14px;
        }

        .search-box input {
            width: 95%;
            font-size: 14px;
        }

        .job {
            padding: 12px;
        }

        button {
            padding: 8px;
        }
    }
     .back-btn {
    position: fixed;
    top: 20px;
    left: 20px;
    font-size: 15px;
    color: #020617;
    text-decoration: none;
    background: #38bdf8;
    padding: 10px 16px;
    border-radius: 10px;
    font-weight: 600;
    transition: all 0.3s ease;
    z-index: 100;
  }

  .back-btn:hover {
    background: #0f0f0f;
  }
</style>

<body>
    <header>
        <h1>🚀 Job Portal</h1>
        <p>Find your dream job</p>
    </header>

    <div class="search-box">
        <input id="search" placeholder="🔍 Search job..." onkeyup="searchJobs()">
    </div>

    <div id="jobs" class="job-container"></div>
    
    
    <a href="projects.html" class="back-btn">
  ⬅ Back
</a>

    <script src="app.js"></script>


</body>

</html>
