<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Grade Calculator</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f172a,#1e293b);
}

.container{
    width:400px;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

h1{
    text-align:center;
    margin-bottom:20px;
    color:#0f172a;
}

input{
    width:100%;
    padding:12px;
    margin:8px 0;
    border:2px solid #ddd;
    border-radius:8px;
    font-size:16px;
}

button{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:none;
    border-radius:8px;
    background:#2563eb;
    color:white;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

.result{
    margin-top:20px;
    padding:15px;
    background:#f8fafc;
    border-radius:10px;
    text-align:center;
    display:none;
}

.result h3{
    margin:8px 0;
}
.back-btn {
    position: fixed;
    top: 20px;
    left: 20px;
    font-size: 15px;
    color: #020617;
    text-decoration: none;
    background: #38bdf8;
    padding: 10px 16px;
    border-radius: 10px;
    font-weight: 600;
    transition: all 0.3s ease;
    z-index: 100;
  }

  .back-btn:hover {
    background: #0f0f10;}
</style>
</head>

<body>
    <a href="projects.html" class="back-btn">
  ⬅ Back
</a>

<div class="container">

<h1>Student Grade Calculator</h1>

<input type="number" id="sub1" placeholder="Subject 1 Marks">
<input type="number" id="sub2" placeholder="Subject 2 Marks">
<input type="number" id="sub3" placeholder="Subject 3 Marks">
<input type="number" id="sub4" placeholder="Subject 4 Marks">
<input type="number" id="sub5" placeholder="Subject 5 Marks">

<button onclick="calculateGrade()">
Calculate Result
</button>

<div class="result" id="result">
    <h3 id="total"></h3>
    <h3 id="percentage"></h3>
    <h3 id="grade"></h3>
</div>

</div>

<script>

function calculateGrade(){

let s1 = Number(document.getElementById("sub1").value);
let s2 = Number(document.getElementById("sub2").value);
let s3 = Number(document.getElementById("sub3").value);
let s4 = Number(document.getElementById("sub4").value);
let s5 = Number(document.getElementById("sub5").value);

if(
s1>100 || s2>100 || s3>100 ||
s4>100 || s5>100 ||
s1<0 || s2<0 || s3<0 ||
s4<0 || s5<0
){
alert("Please enter marks between 0 and 100");
return;
}

let total = s1+s2+s3+s4+s5;
let percentage = total/5;

let grade="";

if(percentage>=90){
grade="A+";
}
else if(percentage>=80){
grade="A";
}
else if(percentage>=70){
grade="B";
}
else if(percentage>=60){
grade="C";
}
else if(percentage>=50){
grade="D";
}
else{
grade="F";
}

document.getElementById("result").style.display="block";

document.getElementById("total").innerHTML=
"Total Marks: "+total+" / 500";

document.getElementById("percentage").innerHTML=
"Percentage: "+percentage.toFixed(2)+"%";

document.getElementById("grade").innerHTML=
"Grade: "+grade;
}

</script>

</body>
</html>
